<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0E0E12">
<title>SERVELEAD — Support Our Mission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E12;
  --card-bg:rgba(255,255,255,0.93);
  --card-border:rgba(255,255,255,0.60);
  --card-top:#C9A84C;
  --text:#1A1A2E;
  --text-muted:rgba(26,26,46,0.50);
  --green:#2E7D32;
  --green-glow:rgba(46,125,50,0.07);
  --gold:#C9A84C;
  --copied:#52B788;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Jost',sans-serif}

/* ── VIDEO ── */
#vid-a{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;
  opacity:1;transition:opacity 0.6s ease;
}

/* ── CANVAS ── */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ── DARK GRADIENT OVERLAY ── */
#overlay{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,
    rgba(14,14,18,0.55) 0%,
    rgba(14,14,18,0.25) 45%,
    rgba(14,14,18,0.60) 100%);
}

/* ── BLUR OVERLAY — celebration background blur ── */
#blur-overlay{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  opacity:0;transition:opacity 0.7s ease;
  backdrop-filter:blur(18px) saturate(0.8) brightness(0.55);
  -webkit-backdrop-filter:blur(18px) saturate(0.8) brightness(0.55);
  background:rgba(14,14,18,0.45);
}

/* ── PHOTO LAYER ── */
#photo-layer{
  position:fixed;inset:0;z-index:5;
  opacity:0;transition:opacity 0.9s ease;
  pointer-events:none;
}
#photo-img{width:100%;height:100%;object-fit:cover;display:block}
#photo-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0) 20%,rgba(0,0,0,0.72) 100%);
}

/* ── THANK YOU ── */
#thankyou{
  position:fixed;inset:0;z-index:6;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px;pointer-events:none;
  opacity:0;transition:opacity 0.7s ease;
}
.ty-main{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(24px,7vw,34px);color:#fff;
  text-align:center;line-height:1.35;
  text-shadow:0 2px 30px rgba(0,0,0,0.9);
}
.ty-rule{width:50px;height:1px;background:var(--gold);opacity:0.55;margin:16px auto}
.ty-sub{
  font-family:'Jost',sans-serif;font-weight:300;font-size:12px;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);text-align:center;
}

/* ── STAGE ── */
#stage{
  position:fixed;inset:0;z-index:3;
  display:flex;align-items:center;justify-content:center;padding:16px;
}

/* ── CARD ── */
#card{
  width:min(92vw,400px);
  background:var(--card-bg);
  backdrop-filter:blur(22px) saturate(1.2);
  -webkit-backdrop-filter:blur(22px) saturate(1.2);
  border:1px solid var(--card-border);
  border-top:2px solid var(--card-top);
  border-radius:20px;
  padding:30px 24px 24px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.06),
    0 30px 80px rgba(0,0,0,0.60),
    0 0 40px var(--green-glow);
  opacity:0;
  transform:translateY(24px) scale(0.975);
  animation:cardIn 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* ── LOGO ── */
#logo{
  width:72px;height:auto;display:block;margin:0 auto 14px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.12));
  opacity:0;transform:scale(0.88);
  animation:logoIn 0.7s ease 0.5s forwards;
}
@keyframes logoIn{to{opacity:1;transform:scale(1)}}

/* ── ORG NAME ── */
.org-name{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  font-size:clamp(13px,3.6vw,17px);letter-spacing:2px;
  text-align:center;color:var(--text);text-transform:uppercase;
  line-height:1.35;opacity:0;
  animation:riseIn 0.55s ease 0.7s forwards;
}

/* ── MISSION ── */
.mission{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:13px;color:var(--green);text-align:center;
  margin-top:6px;opacity:0;
  animation:riseIn 0.55s ease 0.85s forwards;
}

/* ── DIVIDERS ── */
.divider{
  height:1px;margin:18px 0;
  background:linear-gradient(to right,
    transparent,
    rgba(46,125,50,0.20) 15%,
    rgba(201,168,76,0.30) 50%,
    rgba(46,125,50,0.20) 85%,
    transparent);
  transform:scaleX(0);transform-origin:left;
}
.divider.top{animation:divIn 0.6s ease 1.0s forwards}
.divider.bot{opacity:0;animation:riseIn 0.55s ease 1.60s forwards}
@keyframes divIn{to{transform:scaleX(1)}}

/* ── FIELDS ── */
.field{opacity:0;margin-bottom:10px}
.field.f1{animation:riseIn 0.55s ease 1.1s forwards}
.field.f2{animation:riseIn 0.55s ease 1.25s forwards}
.field-label{
  font-family:'Jost',sans-serif;font-weight:500;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--green);opacity:0.75;margin-bottom:4px;
}
.field-value{
  font-family:'Jost',sans-serif;font-weight:600;font-size:15px;
  color:var(--text);line-height:1.25;
}

/* ── CURRENCY TABS ── */
#tab-wrap{
  background:rgba(26,26,46,0.06);border-radius:30px;
  padding:3px;display:flex;margin:16px 0 14px;
  opacity:0;animation:riseIn 0.55s ease 1.35s forwards;
}
.tab{
  flex:1;text-align:center;
  background:transparent;color:rgba(26,26,46,0.45);
  font-family:'Jost',sans-serif;font-weight:600;font-size:13px;
  letter-spacing:0.8px;padding:9px 0;border-radius:26px;
  border:none;cursor:pointer;
  transition:all 0.22s ease;
  min-height:44px;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
}
.tab.active{
  background:var(--green);color:#fff;
  box-shadow:0 2px 8px rgba(46,125,50,0.30);
}

/* ── ACCOUNT SECTION ── */
.acct-section{opacity:0;animation:riseIn 0.55s ease 1.50s forwards}
.acct-label{
  font-family:'Jost',sans-serif;font-weight:500;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--green);opacity:0.75;margin-bottom:6px;
}
.acct-row{display:flex;align-items:center;gap:10px}
#acct-display{
  font-family:'Jost',sans-serif;font-weight:700;
  font-size:clamp(20px,5.5vw,24px);
  letter-spacing:2.5px;color:var(--text);
  flex:1;min-width:0;word-break:break-all;
}

/* ── COPY BUTTON ── */
.copy-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:20px;
  border:1.5px solid var(--green);
  background:transparent;color:var(--green);
  font-family:'Jost',sans-serif;font-weight:500;font-size:11px;
  cursor:pointer;transition:all 0.2s ease;
  white-space:nowrap;flex-shrink:0;
  min-height:44px;min-width:66px;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  outline:none;
}
.copy-btn:hover{background:rgba(46,125,50,0.06)}
.copy-btn:active{transform:scale(0.93)}
.copy-btn.copied{
  border-color:var(--copied);color:var(--copied);
  background:rgba(82,183,136,0.10);
}
.copy-btn.hidden{display:none}

#currency-label{
  font-family:'Jost',sans-serif;font-weight:300;font-size:10px;
  color:rgba(26,26,46,0.40);margin-top:5px;
}

/* ── CALL TO ACTION ── */
.cta{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(14px,3.8vw,16px);color:var(--text);
  text-align:center;line-height:1.6;
  opacity:0;animation:riseIn 0.55s ease 1.70s forwards;
}
.cta-inner{opacity:0.80}

/* ── SHARED KEYFRAME ── */
@keyframes riseIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── ADMIN ── */
#admin{
  position:fixed;bottom:18px;right:18px;z-index:99;
  display:none;
  background:rgba(0,0,0,0.82);
  backdrop-filter:blur(8px);
  border:1px solid rgba(201,168,76,0.28);
  border-radius:10px;padding:9px 15px;
  font-family:'Jost',sans-serif;font-size:12px;
  color:var(--gold);letter-spacing:0.3px;
}

/* ── SHORT SCREEN ── */
@media(max-height:640px){
  #card{padding:20px 20px 16px}
  .divider{margin:12px 0}
  .field{margin-bottom:6px}
  #tab-wrap{margin:10px 0 10px}
}
</style>
</head>

            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="lbl-usd">Copy</span>
        </button>
      </div>
      <div id="currency-label"></div>
    </div>

    <div class="divider bot"></div>

    <div class="cta"><span class="cta-inner" id="el-cta"></span></div>

  </div>
</div>

<div id="admin">&#128065; <span id="admin-count">&hellip;</span> people have visited</div>

<script>
/* ════════════════════════════════════════════════════════
   SERVELEAD — EDIT ONLY THIS SECTION
════════════════════════════════════════════════════════ */
var CONFIG = {
  orgName:      "SERVELEAD HUMANITARIAN INITIATIVE",
  missionLine:  "Sponsor a child at our BWB Solar Powered School",
  callToAction: "Your generosity today writes a child's story tomorrow.",
  accountName:  "Servelead Humanitarian Initiative",
  bankName:     "Zenith Bank",
  accountNGN:   "1221100544",
  accountUSD:   "5071736157",
  adminKey:     "servelead2026",
  videoFile:    "school-video.mp4",
  photoFile:    "children-photo.jpg",
};
/* ════════════════════════════════════════════════════════
   DO NOT EDIT BELOW THIS LINE
════════════════════════════════════════════════════════ */

// ── Populate card ─────────────────────────────────────
document.getElementById("el-orgname").textContent  = CONFIG.orgName;
document.getElementById("el-mission").textContent  = CONFIG.missionLine;
document.getElementById("el-acctname").textContent = CONFIG.accountName;
document.getElementById("el-bank").textContent     = CONFIG.bankName;
document.getElementById("el-cta").textContent      = CONFIG.callToAction;
document.getElementById("acct-display").textContent = CONFIG.accountNGN;
document.getElementById("currency-label").textContent = "Nigerian Naira · Zenith Bank";

// ── PATCH 3: Video src set directly, error-only hide ─
var vidA = document.getElementById("vid-a");
vidA.src = CONFIG.videoFile;
vidA.load();
vidA.play().catch(function() {
  // Autoplay blocked — canvas + dark bg take over. Do NOT hide video here.
});
vidA.addEventListener("error", function() {
  vidA.style.display = "none";
});

// ── Photo fallback flag ───────────────────────────────
window.photoFailed = false;

// ── Tab state ─────────────────────────────────────────
var activeTab = "ngn";

function handleTab(e, tab) {
  e.preventDefault();
  switchTab(tab);
}
function switchTab(tab) {
  if (activeTab === tab) return;
  activeTab = tab;
  document.getElementById("tab-ngn").classList.toggle("active", tab === "ngn");
  document.getElementById("tab-usd").classList.toggle("active", tab === "usd");
  document.getElementById("copy-ngn").classList.toggle("hidden", tab !== "ngn");
  document.getElementById("copy-usd").classList.toggle("hidden", tab !== "usd");
  document.getElementById("acct-display").textContent =
    tab === "ngn" ? CONFIG.accountNGN : CONFIG.accountUSD;
  document.getElementById("currency-label").textContent =
    tab === "ngn"
      ? "Nigerian Naira · Zenith Bank"
      : "US Dollar · Zenith Bank";
  resetBtn("ngn");
  resetBtn("usd");
}
function resetBtn(w) {
  document.getElementById("copy-" + w).classList.remove("copied");
  document.getElementById("lbl-"  + w).textContent = "Copy";
}

// ── Copy lock ─────────────────────────────────────────
var copyLock = false;

function handleCopy(e, which) {
  e.preventDefault();
  doCopy(which);
}

// ── Full copy + celebration sequence ─────────────────
function doCopy(which) {
  if (copyLock) return;
  copyLock = true;

  var number = which === "ngn" ? CONFIG.accountNGN : CONFIG.accountUSD;
  var btn = document.getElementById("copy-" + which);
  var lbl = document.getElementById("lbl-"  + which);

  // Clipboard write — async API with execCommand fallback
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(number).catch(function() {});
    } else { throw new Error(); }
  } catch(_) {
    var ta = document.createElement("textarea");
    ta.value = number;
    ta.style.cssText = "position:fixed;opacity:0;pointer-events:none";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch(e2) {}
    document.body.removeChild(ta);
  }

  // t=0 — button copied state
  btn.classList.add("copied");
  lbl.textContent = "Copied ✓";

  // t=0 — canvas celebrate
  if (window._celebrate) window._celebrate();

  // t=0 — video dim
  vidA.style.opacity = "0.15";

  // t=0 — blur overlay in
  document.getElementById("blur-overlay").style.opacity = "1";

  // t=400ms — photo through the blur
  if (!window.photoFailed) {
    setTimeout(function() {
      document.getElementById("photo-layer").style.opacity = "1";
    }, 400);
  }

  // t=600ms — thank-you text
  setTimeout(function() {
    document.getElementById("thankyou").style.opacity = "1";
  }, 600);

  // t=2500ms — button resets (visual only)
  setTimeout(function() { resetBtn(which); }, 2500);

  // t=4000ms — thank-you fades out
  setTimeout(function() {
    document.getElementById("thankyou").style.opacity = "0";
  }, 4000);

  // t=4500ms — photo fades out
  setTimeout(function() {
    document.getElementById("photo-layer").style.opacity = "0";
  }, 4500);

  // t=4800ms — blur dissolves
  setTimeout(function() {
    document.getElementById("blur-overlay").style.opacity = "0";
  }, 4800);

  // t=5000ms — video returns, canvas resets
  setTimeout(function() {
    vidA.style.opacity = "1";
    if (window._celebrateOff) window._celebrateOff();
  }, 5000);

  // t=5500ms — release lock
  setTimeout(function() { copyLock = false; }, 5500);
}

// ── Interactive Canvas ────────────────────────────────
(function() {
  var cv = document.getElementById("particles");
  if (!cv || !cv.getContext) return;
  var cx = cv.getContext("2d");
  if (!cx) return;

  var W, H, t = 0;
  var cursor = null;
  var bursts = [];
  var pulses = [];
  var celCurrent = 0, celTarget = 0;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  // 70 particles
  var P = [];
  for (var i = 0; i < 70; i++) {
    var isA = i < 39;
    P.push({
      x:    Math.random(),
      y:    Math.random(),
      vy:   -(Math.random() * 0.00022 + 0.00006),
      vx:   (Math.random() - 0.5) * 0.00006,
      r:    isA ? Math.random() * 1.5 + 1 : Math.random() * 0.8 + 1,
      baseA:isA ? Math.random() * 0.25 + 0.15 : Math.random() * 0.15 + 0.10,
      phase:Math.random() * Math.PI * 2,
      typeA:isA,
    });
  }

  // Input tracking
  document.addEventListener("mousemove", function(e) { cursor = {x:e.clientX, y:e.clientY}; });
  document.addEventListener("mouseleave", function() { cursor = null; });
  document.addEventListener("touchmove", function(e) {
    cursor = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }, {passive:true});
  document.addEventListener("touchend", function() { cursor = null; });

  function addPulse(x, y) { pulses.push({x:x, y:y, start:performance.now()}); }
  document.addEventListener("mousedown", function(e) { addPulse(e.clientX, e.clientY); });
  document.addEventListener("touchstart", function(e) {
    addPulse(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});

  // Celebrate API
  window._celebrate = function() {
    celTarget = 1;
    var cx2 = W / 2, cy2 = H * 0.45;
    for (var i = 0; i < 40; i++) {
      var a = Math.random() * Math.PI * 2;
      var s = Math.random() * 4 + 2;
      bursts.push({
        x:cx2, y:cy2,
        vx:Math.cos(a) * s, vy:Math.sin(a) * s,
        r: Math.random() * 1.5 + 1.5,   // always positive
        life: 1.0,
        gold: Math.random() > 0.5,
      });
    }
  };
  window._celebrateOff = function() { celTarget = 0; };

  function frame(now) {
    cx.clearRect(0, 0, W, H);
    t += 0.003;
    celCurrent += (celTarget - celCurrent) * 0.04;

    // Video opacity determines particle dimming
    var vidOp = parseFloat(vidA.style.opacity);
    if (isNaN(vidOp)) vidOp = 1;
    var opMul = vidOp > 0.5 ? 0.5 : 1.0;

    // ── Particles ──────────────────────────────────
    for (var i = 0; i < P.length; i++) {
      var p = P[i];
      var sine = Math.sin(t * 1.2 + p.phase) * 0.00012;

      if (cursor) {
        var dx = cursor.x - p.x * W;
        var dy = cursor.y - p.y * H;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 170) { p.x += (dx / W) * 0.08; p.y += (dy / H) * 0.08; }
      }

      var spd = 1 + celCurrent * 2;
      p.x += (p.vx + sine) * spd;
      p.y += p.vy * spd;

      if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
      if (p.x < -0.02)  p.x = 1.02;
      if (p.x >  1.02)  p.x = -0.02;

      var a = p.baseA * opMul * (1 + celCurrent * 0.4);
      cx.beginPath();
      cx.arc(p.x * W, p.y * H, Math.max(0, p.r), 0, Math.PI * 2); // PATCH 1
      cx.fillStyle = p.typeA
        ? "rgba(255,255,255," + a + ")"
        : "rgba(46,125,50,"   + a + ")";
      cx.fill();
    }

    // ── Connection lines ───────────────────────────
    var lm = 1 + celCurrent;
    for (var i = 0; i < P.length; i++) {
      var pi = P[i];
      for (var j = i + 1; j < P.length; j++) {
        var pj = P[j];
        var dx = (pi.x - pj.x) * W, dy = (pi.y - pj.y) * H;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 110) {
          cx.beginPath();
          cx.moveTo(pi.x * W, pi.y * H);
          cx.lineTo(pj.x * W, pj.y * H);
          cx.strokeStyle = "rgba(255,255,255," + Math.min((1 - d / 110) * 0.10 * lm, 0.20) + ")";
          cx.lineWidth = 0.5;
          cx.stroke();
        }
      }
      if (cursor) {
        var dx = cursor.x - pi.x * W, dy = cursor.y - pi.y * H;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 150) {
          cx.beginPath();
          cx.moveTo(pi.x * W, pi.y * H);
          cx.lineTo(cursor.x, cursor.y);
          cx.strokeStyle = "rgba(46,125,50," + Math.min((1 - d / 150) * 0.14 * lm, 0.25) + ")";
          cx.lineWidth = 0.7;
          cx.stroke();
        }
      }
    }

    // ── Burst particles ────────────────────────────
    bursts = bursts.filter(function(b) { return b.life > 0; });
    for (var bi = 0; bi < bursts.length; bi++) {
      var b = bursts[bi];
      b.x  += b.vx;
      b.y  += b.vy;
      b.vy += 0.07;
      b.life -= 0.014;
      cx.beginPath();
      cx.arc(b.x, b.y, Math.max(0, b.r), 0, Math.PI * 2); // PATCH 1
      cx.fillStyle = b.gold
        ? "rgba(212,175,55," + b.life + ")"
        : "rgba(255,255,255," + b.life + ")";
      cx.fill();
    }

    // ── Tap pulse rings ────────────────────────────
    pulses = pulses.filter(function(p) { return (now - p.start) < 520; });
    for (var pi2 = 0; pi2 < pulses.length; pi2++) {
      var p2 = pulses[pi2];
      var prog    = (now - p2.start) / 500;
      var r       = Math.max(0, prog * 80); // PATCH 1
      var alpha   = 0.4 * (1 - prog);
      cx.beginPath();
      cx.arc(p2.x, p2.y, r, 0, Math.PI * 2);
      cx.strokeStyle = "rgba(212,175,55," + alpha + ")";
      cx.lineWidth = 1.5;
      cx.stroke();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ── Silent visit counter ──────────────────────────────
fetch("https://api.countapi.xyz/hit/servelead-shi-v3/visits").catch(function() {});

// ── Admin panel ───────────────────────────────────────
(function() {
  var p = new URLSearchParams(location.search);
  if (p.get("admin") !== CONFIG.adminKey) return;
  document.getElementById("admin").style.display = "block";
  fetch("https://api.countapi.xyz/get/servelead-shi-v3/visits")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById("admin-count").textContent =
        d.value !== undefined ? d.value : "—";
    })
    .catch(function() {
      document.getElementById("admin-count").textContent = "unavailable";
    });
})();
</script>
